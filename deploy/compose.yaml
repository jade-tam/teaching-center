services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: tam
      POSTGRES_PASSWORD: ValidPass123!
      POSTGRES_DB: appdb

    ports:
      - "5432:5432"

    volumes:
      - /srv/tam-app/postgresql/data:/var/lib/postgresql/data

  backend:
    build: ../backend
    container_name: backend
    restart: unless-stopped

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/appdb
      DB_USER: tam
      DB_PASSWORD: ValidPass123!

    ports:
      - "8080:8080"

    depends_on:
      - postgres

volumes:
  postgres_data:
